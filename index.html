<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบิลหวย - Suda online</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        #bill-capture { width: 380px; background: white; padding: 25px; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="bg-blue-700 text-white p-6 shadow-md mb-6">
        <h1 class="text-xl font-bold text-center">ระบบจัดการบิล (หัก 27%)</h1>
        <p class="text-center text-sm opacity-80">Phrae Social Development Project</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4 border-2 border-blue-100">
            <div>
                <label class="text-gray-600 text-sm font-semibold">ชื่อลูกค้า / งวดที่</label>
                <input type="text" id="custName" class="w-full border-2 border-gray-100 p-3 rounded-xl mt-1 focus:border-blue-500 outline-none" placeholder="ระบุชื่อลูกค้า">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-600 text-sm font-semibold">ยอดซื้อรวม (บาท)</label>
                    <input type="number" id="totalInput" oninput="doCalc()" class="w-full border-2 border-gray-100 p-3 rounded-xl mt-1 text-lg font-bold" placeholder="0">
                </div>
                <div>
                    <label class="text-green-600 text-sm font-bold">ยอดถูกรางวัล (ถ้ามี)</label>
                    <input type="number" id="winInput" oninput="doCalc()" class="w-full border-2 border-green-100 p-3 rounded-xl mt-1 text-lg text-green-600 font-bold" placeholder="0">
                </div>
            </div>
        </div>

        <div class="mt-6 bg-white p-6 rounded-2xl shadow-sm border-t-8 border-blue-600">
            <h3 class="font-bold text-gray-700 mb-4 text-center text-lg">--- สรุปยอดชำระ ---</h3>
            <div class="space-y-3 text-lg">
                <div class="flex justify-between">
                    <span class="text-gray-500">ยอดซื้อ:</span>
                    <span id="show-total" class="font-semibold text-gray-800">0.00</span>
                </div>
                <div class="flex justify-between text-red-500 font-semibold">
                    <span>ส่วนลด (27%):</span>
                    <span id="show-disc">0.00</span>
                </div>
                <div class="flex justify-between text-green-600 font-semibold">
                    <span>ยอดถูกรางวัล:</span>
                    <span id="show-win">0.00</span>
                </div>
                <div class="flex justify-between border-t-2 border-dashed pt-4 mt-4 text-2xl font-bold text-blue-800">
                    <span>ยอดสุทธิ:</span>
                    <span id="show-net">0.00</span>
                </div>
            </div>
        </div>

        <button onclick="takeSnapshot()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
            📸 บันทึกบิลลงเครื่อง
        </button>
    </div>

    <div style="position: absolute; left: -9999px;">
        <div id="bill-capture" class="text-gray-800">
            <div class="text-center border-b-2 border-dashed pb-4 mb-4">
                <h2 class="font-bold text-2xl text-blue-700">ใบสรุปยอดบิล</h2>
                <p id="bill-date" class="text-sm text-gray-500"></p>
            </div>
            <p class="text-lg mb-4"><strong>ลูกค้า:</strong> <span id="bill-cust"></span></p>
            <div class="space-y-3 border-b-2 border-dashed pb-4 mb-4">
                <div class="flex justify-between text-xl">
                    <span>ยอดซื้อรวม:</span>
                    <span id="bill-total"></span>
                </div>
                <div class="flex justify-between text-red-600">
                    <span>ส่วนลด (27%):</span>
                    <span id="bill-disc-val"></span>
                </div>
                <div class="flex justify-between text-green-600 font-bold">
                    <span>ยอดถูกรางวัล:</span>
                    <span id="bill-win-val"></span>
                </div>
            </div>
            <div class="flex justify-between text-3xl font-bold text-blue-900 py-2">
                <span>ยอดสุทธิ:</span>
                <span id="bill-net-val"></span>
            </div>
            <div class="text-center mt-6 text-gray-400 text-xs">
                * ขอบคุณที่ใช้บริการ / พมจ.แพร่ *
            </div>
        </div>
    </div>

    <script>
        function doCalc() {
            const total = parseFloat(document.getElementById('totalInput').value) || 0;
            const win = parseFloat(document.getElementById('winInput').value) || 0;
            const discount = total * 0.27;
            const net = (total - discount) - win;

            document.getElementById('show-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('show-disc').innerText = "-" + discount.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('show-win').innerText = win.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('show-net').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2});

            document.getElementById('bill-cust').innerText = document.getElementById('custName').value || 'ทั่วไป';
            document.getElementById('bill-total').innerText = total.toLocaleString();
            document.getElementById('bill-disc-val').innerText = "-" + discount.toLocaleString();
            document.getElementById('bill-win-val').innerText = win.toLocaleString();
            document.getElementById('bill-net-val').innerText = net.toLocaleString();
            document.getElementById('bill-date').innerText = new Date().toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
        }

        function takeSnapshot() {
            const bill = document.getElementById('bill-capture');
            html2canvas(bill, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Bill-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
