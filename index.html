<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suda Lottery - Smart Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #fdfbfb; }
        .pastel-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .type-btn-active { background: #6366f1 !important; color: white !important; border-color: #6366f1 !important; transform: scale(1.05); }
        .nav-tab-active { color: #6366f1; border-bottom: 4px solid #6366f1; }
        #bill-capture-1, #bill-capture-2 { width: 400px; background: white; padding: 30px; border-radius: 20px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="sticky top-0 z-50 bg-white shadow-sm flex">
        <button onclick="changePage('page1')" id="btn-page1" class="flex-1 py-4 font-bold nav-tab-active">
            <i class="fas fa-edit mr-2"></i>หน้าออกบิล
        </button>
        <button onclick="changePage('page2')" id="btn-page2" class="flex-1 py-4 font-bold text-gray-400">
            <i class="fas fa-chart-pie mr-2"></i>หน้าสรุปงวด
        </button>
    </div>

    <div id="page1" class="max-w-md mx-auto px-4 py-6 space-y-4">
        <div class="pastel-card p-6">
            <div class="flex justify-between items-center mb-1">
                <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Client Name</label>
                <span id="edit-mode-tag" class="hidden text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-bold">โหมดแก้ไข</span>
            </div>
            <input type="text" id="custName" class="w-full border-b-2 border-gray-100 p-2 outline-none font-bold text-lg focus:border-indigo-300 transition-all" placeholder="ชื่อลูกค้า / งวด...">
            
            <div class="grid grid-cols-12 gap-2 mt-4">
                <input type="text" id="lotNumber" class="col-span-8 bg-gray-50 p-4 rounded-xl text-2xl font-black outline-none border-2 border-transparent focus:border-indigo-200" placeholder="เลข">
                <button onclick="handleSmartReverse()" class="col-span-4 bg-indigo-500 text-white rounded-xl font-bold text-xs shadow-md active:scale-90 transition-all">สลับชุด</button>
                
                <div class="col-span-12 grid grid-cols-3 gap-2 py-2">
                    <button onclick="toggleType('บน', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="บน">บน (60/500)</button>
                    <button onclick="toggleType('โต๊ด', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="โต๊ด">โต๊ด (80)</button>
                    <button onclick="toggleType('ล่าง', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="ล่าง">ล่าง (60)</button>
                    <button onclick="toggleType('บน+ล่าง', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="บน+ล่าง">บน+ล่าง</button>
                    <button onclick="toggleType('อั้น', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="อั้น">อั้น (30)</button>
                    <button onclick="toggleType('ชุด', this)" class="type-btn p-3 rounded-xl border-2 text-[10px] font-bold bg-white text-gray-400 border-gray-100 transition-all" data-val="ชุด">ชุดพิเศษ</button>
                </div>
                
                <input type="number" id="lotPrice" class="col-span-12 bg-orange-50 p-4 rounded-xl text-2xl font-black text-orange-600 outline-none border-2 border-orange-100" placeholder="ราคา">
            </div>
            <button onclick="addItem()" class="w-full mt-6 bg-indigo-500 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-600 active:scale-95 transition-all">
                <i class="fas fa-plus-circle mr-2"></i>เพิ่มรายการลงบิล
            </button>
        </div>

        <div id="itemList" class="space-y-2"></div>

        <div class="pastel-card p-6 bg-indigo-900 text-white shadow-xl">
            <div class="space-y-2 text-sm">
                <div class="flex justify-between opacity-70"><span>ยอดซื้อรวม:</span><span id="res-total">0.00</span></div>
                <div class="flex justify-between text-yellow-400 font-bold"><span>ส่วนลดคอม (27%):</span><span id="res-disc">0.00</span></div>
                <div class="flex justify-between border-t border-indigo-800 pt-3 text-2xl font-black">
                    <span class="text-indigo-300">ยอดสุทธิ:</span><span id="res-net" class="text-white">0.00</span>
                </div>
            </div>
            <button onclick="saveBillToSystem()" id="btn-save-bill" class="w-full mt-6 bg-green-500 text-white py-4 rounded-xl font-black shadow-lg">บันทึกข้อมูลเข้าหน้าสรุป</button>
            <div class="grid grid-cols-2 gap-2 mt-3">
                <button onclick="takeSnapshot(1)" class="bg-white/10 p-2 rounded-lg text-[10px] border border-white/20 font-bold">📸 บิลหัก %</button>
                <button onclick="takeSnapshot(2)" class="bg-white/10 p-2 rounded-lg text-[10px] border border-white/20 font-bold">📸 บิลยอดเต็ม</button>
            </div>
        </div>
    </div>

    <div id="page2" class="max-w-md mx-auto px-4 py-6 hidden space-y-4">
        
        <div class="pastel-card p-6 bg-white border-t-8 border-green-500 shadow-md">
            <h3 class="font-black text-gray-700 text-lg mb-4 flex items-center justify-between">
                <span>สรุปรายได้รวมงวดนี้</span>
                <i class="fas fa-chart-line text-green-500"></i>
            </h3>
            <div class="grid grid-cols-2 gap-4 text-sm font-semibold">
                <div class="bg-gray-50 p-3 rounded-xl text-center">
                    <p class="text-[9px] text-gray-400 uppercase">ยอดขายรวม</p>
                    <p id="total-gross" class="text-lg font-black text-indigo-600">0.00</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl text-center">
                    <p class="text-[9px] text-gray-400 uppercase">ค่าคอม (27%)</p>
                    <p id="total-comm" class="text-lg font-black text-pink-500">0.00</p>
                </div>
                <div class="bg-indigo-50 p-3 rounded-xl text-center col-span-2">
                    <p class="text-[9px] text-indigo-400 uppercase">กำไรสุทธิ (หลังหักรางวัล)</p>
                    <p id="total-profit" class="text-3xl font-black text-green-600">0.00</p>
                </div>
                <div class="bg-red-50 p-3 rounded-xl text-center col-span-2 border-t border-red-100">
                    <p class="text-[9px] text-red-400 uppercase">ยอดรางวัลที่ต้องจ่ายรวม</p>
                    <p id="total-prize-payout" class="text-xl font-black text-red-600">0.00</p>
                </div>
            </div>
        </div>

        <div class="pastel-card p-5 border-l-8 border-yellow-500 shadow-sm">
            <h3 class="font-bold text-gray-700 mb-3 text-sm">ตรวจรางวัลอัตโนมัติ</h3>
            <div class="grid grid-cols-3 gap-2">
                <input type="text" id="win3Top" class="border-b-2 p-2 text-xl font-black text-center outline-none" placeholder="3บน">
                <input type="text" id="win2Top" class="border-b-2 p-2 text-xl font-black text-center outline-none" placeholder="2บน">
                <input type="text" id="win2Bottom" class="border-b-2 p-2 text-xl font-black text-center outline-none" placeholder="2ล่าง">
            </div>
            <button onclick="autoCheckPrizes()" class="w-full mt-4 bg-yellow-500 text-white py-2.5 rounded-xl font-black shadow-md">ตรวจรางวัลทุกบิล</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-4 top-4 text-gray-300"></i>
            <input type="text" id="searchInput" oninput="renderDashboard()" class="w-full bg-white p-3.5 pl-11 rounded-2xl outline-none shadow-sm" placeholder="ค้นชื่อลูกค้า...">
        </div>
        
        <div id="historyList" class="space-y-3"></div>
        <button onclick="clearData()" class="w-full py-6 text-red-300 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-trash-alt mr-2"></i>Clear All Data</button>
    </div>

    <div style="position: absolute; left: -9999px;">
        <div id="bill-capture-1">
            <h2 class="text-center font-black text-indigo-500 text-2xl border-b-2 pb-2 italic">SUDA LOTTERY</h2>
            <p id="b1-cust" class="mt-4 font-bold text-lg"></p>
            <table class="w-full mt-4 text-left text-sm" id="b1-table"></table>
            <div class="mt-6 pt-4 border-t-2 border-gray-50 space-y-1 bg-gray-50 p-4 rounded-2xl">
                <div class="flex justify-between"><span>ยอดซื้อ:</span><span id="b1-total"></span></div>
                <div class="flex justify-between text-red-500"><span>ส่วนลดคอม (27%):</span><span id="b1-disc"></span></div>
                <div class="flex justify-between text-green-600 font-bold"><span>รางวัล:</span><span id="b1-win"></span></div>
                <div class="flex justify-between text-3xl font-black text-indigo-600 pt-2 border-t mt-2"><span>สุทธิ:</span><span id="b1-net"></span></div>
            </div>
        </div>
        <div id="bill-capture-2">
            <h2 class="text-center font-black text-indigo-400 text-2xl border-b-2 pb-2 italic">SUDA LOTTERY</h2>
            <p id="b2-cust" class="mt-4 font-bold text-lg"></p>
            <table class="w-full mt-4 text-left text-sm" id="b2-table"></table>
            <div class="mt-6 pt-6 border-t-2 border-indigo-100 flex justify-between items-center text-4xl font-black">
                <span class="text-xs text-gray-400 font-bold uppercase">Total:</span><span id="b2-net"></span>
            </div>
        </div>
    </div>

    <script>
        let currentItems = [];
        let currentType = "";
        let editingBillId = null;
        const RATES = { "บน": (n) => n.length === 3 ? 500 : 60, "ล่าง": 60, "โต๊ด": 80, "อั้น": 30, "บน+ล่าง": 60, "ชุด": 60 };

        function changePage(pageId) {
            document.getElementById('page1').classList.toggle('hidden', pageId !== 'page1');
            document.getElementById('page2').classList.toggle('hidden', pageId !== 'page2');
            document.getElementById('btn-page1').classList.toggle('nav-tab-active', pageId === 'page1');
            document.getElementById('btn-page2').classList.toggle('nav-tab-active', pageId === 'page2');
            if(pageId === 'page2') renderDashboard();
        }

        function toggleType(type, btn) {
            if (currentType === type) { currentType = ""; btn.classList.remove('type-btn-active'); }
            else { 
                currentType = type; 
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('type-btn-active')); 
                btn.classList.add('type-btn-active'); 
            }
        }

        function getPerms(str) {
            if (str.length === 1) return [str];
            let p = [];
            for (let i = 0; i < str.length; i++) {
                let char = str[i], rem = str.slice(0, i) + str.slice(i + 1);
                for (let r of getPerms(rem)) p.push(char + r);
            }
            return [...new Set(p)];
        }

        function handleSmartReverse() {
            const num = document.getElementById('lotNumber').value, price = parseFloat(document.getElementById('lotPrice').value) || 0;
            if (!currentType || num.length < 2 || price <= 0) return alert("ข้อมูลไม่ครบ");
            const perms = getPerms(num);
            if(currentType === 'บน+ล่าง') {
                perms.forEach(n => { addSingleItem(n, 'บน', price); addSingleItem(n, 'ล่าง', price); });
            } else {
                perms.forEach(n => addSingleItem(n, currentType, price));
            }
            renderCurrentBill();
        }

        function addItem() {
            const num = document.getElementById('lotNumber').value, price = parseFloat(document.getElementById('lotPrice').value) || 0;
            if (!currentType || !num || price <= 0) return alert("ข้อมูลไม่ครบ");
            if(currentType === 'บน+ล่าง') { addSingleItem(num, 'บน', price); addSingleItem(num, 'ล่าง', price); }
            else { addSingleItem(num, currentType, price); }
            renderCurrentBill();
        }

        function addSingleItem(num, type, price) {
            const rate = (typeof RATES[type] === 'function') ? RATES[type](num) : RATES
